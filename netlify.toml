[build]
  publish = "."
  functions = "netlify/functions"

[functions."analyze-specs"]
  timeout = 10

[functions."analyze-chain"]
  timeout = 10

[functions."analyze-summary"]
  timeout = 10

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
